name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_TARGET_DIR: /tmp/cargo-target
  CARGO_NET_RETRY: 2
  CARGO_NET_TIMEOUT: 10

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache
        sudo rm -rf /usr/local/.ghcup /usr/local/lib/android
        sudo rm -rf /usr/local/share/powershell /usr/share/swift
        sudo apt-get clean && sudo rm -rf /var/lib/apt/lists/*

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo registry
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Check formatting
      run: cargo fmt --all -- --check

    # Clippy compiles everything — tests reuse the same artifacts (same target dir + profile)
    - name: Clippy
      run: cargo clippy --workspace --all-targets --all-features --profile ci -- -D warnings

    - name: Unit tests
      run: cargo test --workspace --profile ci --lib --bins

    - name: Check examples compile
      run: cargo check --examples --profile ci

    - name: Cleanup
      if: always()
      run: rm -rf /tmp/cargo-target

  wasm:
    name: WASM
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Cache cargo registry
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-wasm-

    - name: Build & test WASM
      run: |
        cargo build -p turbomcp-wasm --target wasm32-unknown-unknown --profile wasm-release
        cargo test -p turbomcp-wasm --lib

    - name: Check binary size
      run: |
        SIZE=$(stat -c%s target/wasm32-unknown-unknown/wasm-release/turbomcp_wasm.wasm 2>/dev/null || stat -f%z target/wasm32-unknown-unknown/wasm-release/turbomcp_wasm.wasm)
        echo "WASM binary size: ${SIZE} bytes ($(numfmt --to=iec ${SIZE}))"
        if [ $SIZE -gt 2097152 ]; then
          echo "::warning::WASM binary exceeds 2MB"
        fi

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v6

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache
        sudo rm -rf /usr/local/lib/android /usr/local/share/powershell
        sudo apt-get clean

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Cache cargo registry
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-coverage-

    - name: Generate coverage
      env:
        CARGO_TARGET_DIR: /tmp/cargo-coverage
      run: |
        cargo llvm-cov --workspace --lib --lcov --output-path lcov.info \
          --ignore-filename-regex '(tests?/|benches/|examples/)'

        COVERAGE=$(cargo llvm-cov report --workspace --lib 2>/dev/null | grep -E 'TOTAL' | awk '{print $NF}' | tr -d '%')
        echo "Coverage: ${COVERAGE}%"

        MIN_COVERAGE=70
        if [ "$(echo "$COVERAGE < $MIN_COVERAGE" | bc -l)" -eq 1 ]; then
          echo "::error::Coverage ${COVERAGE}% is below minimum ${MIN_COVERAGE}%"
          exit 1
        fi

    - name: Upload coverage
      uses: codecov/codecov-action@v5
      with:
        files: lcov.info
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
